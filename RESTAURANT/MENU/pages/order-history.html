<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order History</title>


    <!-- Common CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/order-history.css">


    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


</head>
<body>

<div class="phone">


    <!-- Header -->
    <header class="page-header">

        <a href="profile.html" class="back-btn" aria-label="Back">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h2 class="section-title">
            Order History
        </h2>

    </header>

    <main class="order-main">

        <!-- Search -->

        <div class="search-section">

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input 
                type="text"
                id="searchInput"
                placeholder="Search Order ID">
            </div>
        </div>
        <!-- Orders -->

        <section id="orderContainer">
        
        </section>

        <!-- Empty History -->

        <div class="empty-history" id="emptyHistory">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <h2>
                No Orders Yet
            </h2>
            <p>
                Your previous orders will appear here.
            </p>
        </div>

        <!-- Clear History -->

        <button id="clearHistory" class="clear-btn">
            <i class="fa-solid fa-trash"></i>
            Clear History
        </button>
    </main>

    <!-- Popup -->
    <div class="popup" id="popup">
        <div class="popup-content">
            <span class="close" id="closePopup">

                &times;
            </span>
            <h2>
                Order Details
            </h2>
            <div id="popupDetails">
            </div>


        </div>
    </div>

    <!-- Bottom Navigation -->

    <nav>


        <a href="../pages/home.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>
                Home
            </span>
        </a>

        <a href="favourites.html" class="nav-item">
            <i class="fa-solid fa-heart"></i>
            <span>
                Favourite
            </span>
        </a>





        <a href="cart.html" class="nav-item">
            <i class="fa-solid fa-cart-shopping"></i>

            <span>
                Cart
            </span>


        </a>


        <a href="profile.html" class="nav-item active">
            <i class="fa-solid fa-user"></i>
            <span>
                Profile
            </span>


        </a>
    </nav>



</div>





<script src="../js/order-history.js"></script>


</body>

</html>
