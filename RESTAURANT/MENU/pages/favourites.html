<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favourite</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/favourites.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="phone">

        <!-- Header -->
        <header>

            <h2>Your Favourites</h2>

        </header>

        <main>

            <!-- Hero Banner -->

            <section class="favorite-large-hero-card">

                <div class="hero-card-details">

                    <span class="hero-card-badge">
                        Favourite Foods
                    </span>

                    <h2>Your Favourite Meals ❤️</h2>

                    <p>Quick access to your loved dishes</p>

                </div>

                <div class="hero-card-graphic-wrapper">

                    <span class="food-emoji-large">🍕</span>

                </div>

            </section>

            <!-- Favourite Grid -->

            <section class="favorites-grid">

                <div class="favorites-grid-card">

                    <div class="grid-card-heart">
                        <i class="fa-solid fa-heart"></i>
                    </div>

                    <div class="grid-card-image-box">
                        <span class="food-emoji-medium">🍔</span>
                    </div>

                    <div class="grid-card-info">
                        <h3>Burger</h3>
                        <p class="grid-card-price">₹120</p>
                        <button class="add-btn">Add to Cart</button>
                    </div>

                </div>

                <div class="favorites-grid-card">

                    <div class="grid-card-heart">
                        <i class="fa-solid fa-heart"></i>
                    </div>

                    <div class="grid-card-image-box">
                        <span class="food-emoji-medium">🍕</span>
                    </div>

                    <div class="grid-card-info">
                        <h3>Pizza</h3>
                        <p class="grid-card-price">₹250</p>
                        <button class="add-btn">Add to Cart</button>
                    </div>

                </div>

                <div class="favorites-grid-card">

                    <div class="grid-card-heart">
                        <i class="fa-solid fa-heart"></i>
                    </div>

                    <div class="grid-card-image-box">
                        <span class="food-emoji-medium">🍜</span>
                    </div>

                    <div class="grid-card-info">
                        <h3>Noodles</h3>
                        <p class="grid-card-price">₹150</p>
                        <button class="add-btn">Add to Cart</button>
                    </div>

                </div>

                <div class="favorites-grid-card">

                    <div class="grid-card-heart">
                        <i class="fa-solid fa-heart"></i>
                    </div>

                    <div class="grid-card-image-box">
                        <span class="food-emoji-medium">🍰</span>
                    </div>

                    <div class="grid-card-info">
                        <h3>Cake</h3>
                        <p class="grid-card-price">₹300</p>
                        <button class="add-btn">Add to Cart</button>
                    </div>

                </div>

            </section>

        </main>

        <!-- Bottom Navigation -->

        <nav>

            <a href="../pages/home.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>

            <a href="favourites.html" class="nav-item active">
                <i class="fa-solid fa-heart"></i>
                <span>Favourite</span>
            </a>

            <a href="cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>

            <a href="profile.html" class="nav-item">
                <i class="fa-regular fa-user"></i>
                <span>Profile</span>
            </a>
            

        </nav>

    </div>
    <script src="../js/favourite.js" defer></script>

</body>

</html>
