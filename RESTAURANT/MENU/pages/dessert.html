<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desserts</title>
    <link rel="stylesheet" href="dessert.css">
</head>
<body>

<header>
    <button onclick="goBack()">←</button>
    <h2>Desserts</h2>
</header>

<div class="container">

    <div class="card">
        <img src="chocolate cake.jpeg" alt="">
        <h3>Chocolate Cake</h3>
        <p>₹180</p>
        <button onclick="addCart('Chocolate Cake')">Add</button>
    </div>

    <div class="card">
        <img src="brownie.jpeg" alt="">
        <h3>Brownie</h3>
        <p>₹120</p>
        <button onclick="addCart('Brownie')">Add</button>
    </div>

    <div class="card">
        <img src="ice cream.jpeg" alt="">
        <h3>Ice Cream</h3>
        <p>₹90</p>
        <button onclick="addCart('Ice Cream')">Add</button>
    </div>

    <div class="card">
        <img src="gulab jamun.jpeg" alt="">
        <h3>Gulab Jamun</h3>
        <p>₹80</p>
        <button onclick="addCart('Gulab Jamun')">Add</button>
    </div>

    <div class="card">
        <img src="donut.jpeg" alt="">
        <h3>Donut</h3>
        <p>₹110</p>
        <button onclick="addCart('Donut')">Add</button>
    </div>

    <div class="card">
        <img src="waffle.jpeg" alt="Waffle">
        <h3>Belgian Waffle</h3>
        <p>₹190</p>
        <button onclick="addCart('Belgian Waffle')">Add</button>
    </div>

    <div class="card">
        <img src="pancake.jpeg" alt="Pancake">
        <h3>Pancake</h3>
        <p>₹170</p>
        <button onclick="addCart('Pancake')">Add</button>
    </div>
  
</div>

<script src="dessert.js"></script>

</body>
</html>
