<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beverages</title>
    <link rel="stylesheet" href="beverages.css">
</head>
<body>

<header>
    <button onclick="goBack()">←</button>
    <h2>Beverages</h2>
</header>

<div class="container">

    <div class="card">
        <img src=" hot coffee.jpeg" alt="Coffee">
        <h3>Hot Coffee</h3>
        <p>₹120</p>
        <button onclick="addDrink('Hot Coffee')">Add</button>
    </div>

    <div class="card">
        <img src="cold coffee.jpeg" alt="Cold Coffee">
        <h3>Cold Coffee</h3>
        <p>₹180</p>
        <button onclick="addDrink('Cold Coffee')">Add</button>
    </div>

    <div class="card">
        <img src="cappuccino.jpeg" alt="Cappuccino">
        <h3>Cappuccino</h3>
        <p>₹170</p>
        <button onclick="addDrink('Cappuccino')">Add</button>
    </div>

    <div class="card">
        <img src="mojito.webp" alt="Mojito">
        <h3>Mojito</h3>
        <p>₹150</p>
        <button onclick="addDrink('Mojito')">Add</button>
    </div>

    <div class="card">
        <img src="orange juice.png" alt="Orange Juice">
        <h3>Orange Juice</h3>
        <p>₹140</p>
        <button onclick="addDrink('Orange Juice')">Add</button>
    </div>

    <div class="card">
        <img src="chocolate milkshake.jpeg" alt="Milkshake">
        <h3>Chocolate Milkshake</h3>
        <p>₹190</p>
        <button onclick="addDrink('Chocolate Milkshake')">Add</button>
    </div>

    <div class="card">
        <img src="Green tea.jpeg" alt="Green Tea">
        <h3>Green Tea</h3>
        <p>₹90</p>
        <button onclick="addDrink('Green Tea')">Add</button>
    </div>

    <div class="card">
        <img src="fresh lemonade.jpeg" alt="Lemonade">
        <h3>Fresh Lemonade</h3>
        <p>₹100</p>
        <button onclick="addDrink('Fresh Lemonade')">Add</button>
    </div>

</div>

<script src="beverages.js"></script>

</body>
</html>
