<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starter Menu</title>
    <link rel="stylesheet" href="starter.css">
</head>
<body>

<header>
    <button onclick="goBack()">&#8592;</button>
    <h2>Starter Menu</h2>
</header>

<div class="container">

    <div class="card">
        <img src="spring roll.jpeg" alt="Spring Roll">
        <h3>Spring Roll</h3>
        <p>₹150</p>
        <button onclick="addCart('Spring Roll')">Add</button>
    </div>

    <div class="card">
        <img src="French fries.jpeg" alt="French Fries">
        <h3>French Fries</h3>
        <p>₹120</p>
        <button onclick="addCart('French Fries')">Add</button>
    </div>

    <div class="card">
        <img src="garlic bread.jpeg" alt="Garlic Bread">
        <h3>Garlic Bread</h3>
        <p>₹140</p>
        <button onclick="addCart('Garlic Bread')">Add</button>
    </div>

    <div class="card">
        <img src="paneer tikka.jpeg" alt="Paneer Tikka">
        <h3>Paneer Tikka</h3>
        <p>₹220</p>
        <button onclick="addCart('Paneer Tikka')">Add</button>
    </div>

    <div class="card">
        <img src="veg momos.jpeg" alt="Veg Momos">
        <h3>Veg Momos</h3>
        <p>₹160</p>
        <button onclick="addCart('Veg Momos')">Add</button>
    </div>

    <div class="card">
        <img src="cheese ball.jpeg" alt="Cheese Balls">
        <h3>Cheese Balls</h3>
        <p>₹180</p>
        <button onclick="addCart('Cheese Balls')">Add</button>
    </div>

    <div class="card">
    <img src="chilli paneer.jpeg" alt="Chilli Paneer">
    <h3>Chilli Paneer</h3>
    <p>₹250</p>
    <button onclick="addStarter('Chilli Paneer')">Add</button>
    </div> 

    <div class="card">
    <img src="paneer pakora.png" alt="Paneer Pakora">
    <h3>Paneer Pakora</h3>
    <p>₹200</p>
    <button onclick="addStarter('Paneer Pakora')">Add</button>
    </div>

</div>

<script src="starter.js"></script>

</body>
</html>
