<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Address</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/address.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- JavaScript -->
    <script src="../js/translations.js" defer></script>
    <script src="../js/script.js" defer></script>
</head>

<body>

    <div class="phone">

        <main>

            <!-- Header -->
            <div class="header-row">

                <header class="page-header">

                    <a href="profile.html" class="back-btn" aria-label="Back">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>

                    <h2 class="section-title">Delivery Address</h2>

                </header>

                <button id="addAddressBtn" class="btn-search" type="button" aria-label="Add Address">

                    <i class="fa-solid fa-plus"></i>

                </button>

            </div>

            <!-- Address List -->
            <section class="profile-menu-list">

                <!-- Home Address -->
                <div class="profile-menu-item">

                    <div class="menu-item-left">

                        <div class="menu-item-icon">🏠</div>

                        <div class="menu-item-text">

                            <h3>Home Address</h3>

                            <p>
                                ABCD Colony,<br>
                                New Delhi - 110001
                            </p>

                        </div>

                    </div>

                    <i class="fa-solid fa-pen-to-square edit-address"></i>

                </div>

                <!-- Work Address -->
                <div class="profile-menu-item">

                    <div class="menu-item-left">

                        <div class="menu-item-icon">🏢</div>

                        <div class="menu-item-text">

                            <h3>Work Address</h3>

                            <p>
                                123 Tech Park,<br>
                                Phase 2, New Delhi - 110020
                            </p>

                        </div>

                    </div>

                    <i class="fa-solid fa-pen-to-square edit-address"></i>

                </div>

            </section>

        </main>

        <!-- Bottom Navigation -->
        <nav>

            <a href="../pages/home.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>

            <a href="favourites.html" class="nav-item">
                <i class="fa-solid fa-heart"></i>
                <span>Favourite</span>
            </a>

            <a href="cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>

            <a href="profile.html" class="nav-item active">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </a>
            

        </nav>

    </div>

</body>

</html>
