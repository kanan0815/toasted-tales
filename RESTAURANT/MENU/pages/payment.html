<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment Methods - Toasted Tales</title>

    <!-- Common CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/payment.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="phone">

        <!-- Header -->
        <header class="page-header">

            <a href="profile.html" class="back-btn" aria-label="Go Back">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <h2 class="section-title">
                Payment Methods
            </h2>

        </header>

        <!-- Main -->
        <main class="payment-main">

            <form id="paymentForm">

                <!-- ================= CARD ================= -->

                <div class="payment-card">

                    <div class="payment-left">

                        <div class="payment-icon">
                            💳
                        </div>

                        <div>

                            <h3>Credit / Debit Card</h3>

                            <p>Visa, MasterCard, RuPay</p>

                        </div>

                    </div>

                    <input type="radio" id="cardRadio" name="payment" value="card"   aria-label="Credit or Debit Card">

                </div>

                <div class="payment-details" id="cardDetails">

                    <label for="cardNumber">Card Number</label>

                    <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456"
                        maxlength="19" autocomplete="cc-number">

                    <label for="cardHolder">Card Holder Name</label>

                    <input type="text" id="cardHolder" name="cardHolder" placeholder="Enter Card Holder Name"
                        autocomplete="cc-name">

                    <div class="payment-row">

                        <div>

                            <label for="expiry">
                                Expiry
                            </label>

                            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5"
                                autocomplete="cc-exp">

                        </div>

                        <div>

                            <label for="cvv">
                                CVV
                            </label>

                            <input type="password" id="cvv" name="cvv" placeholder="123" maxlength="3"
                                autocomplete="cc-csc">

                        </div>

                    </div>

                </div>

                <!-- ================= UPI ================= -->

                <div class="payment-card">

                    <div class="payment-left">

                        <div class="payment-icon">
                            📱
                        </div>

                        <div>

                            <h3>UPI</h3>

                            <p>Google Pay, PhonePe, Paytm</p>

                        </div>

                    </div>

                    <input type="radio" id="upiRadio" name="payment" value="upi" aria-label="Upi Payment">

                </div>

                <div class="payment-details" id="upiDetails">

                    <label for="upiId">
                        UPI ID
                    </label>

                    <input type="text" id="upiId" name="upiId" placeholder="example@upi" autocomplete="off">

                </div>

                <!-- ================= CASH ================= -->

                <div class="payment-card">

                    <div class="payment-left">

                        <div class="payment-icon">
                            💵
                        </div>

                        <div>

                            <h3>Cash on Delivery</h3>

                            <p>Pay when order is delivered</p>

                        </div>

                    </div>

                    <input type="radio" id="cashRadio" name="payment" value="cash" aria-label="Cash on Delivery">

                </div>

                <!-- ================= BANK ================= -->

                <div class="payment-card">

                    <div class="payment-left">

                        <div class="payment-icon">
                            🏦
                        </div>

                        <div>

                            <h3>Net Banking</h3>

                            <p>All Major Banks Supported</p>

                        </div>

                    </div>

                    <input type="radio" id="bankRadio" name="payment" value="bank" aria-label="Net Banking">

                </div>

                <div class="payment-details" id="bankDetails">

                    <label for="bank">
                        Select Your Bank
                    </label>

                    <select id="bank" name="bank">

                        <option value="">
                            -- Select Bank --
                        </option>

                        <option value="SBI">
                            State Bank of India
                        </option>

                        <option value="HDFC">
                            HDFC Bank
                        </option>

                        <option value="ICICI">
                            ICICI Bank
                        </option>

                        <option value="AXIS">
                            Axis Bank
                        </option>

                        <option value="PNB">
                            Punjab National Bank
                        </option>

                    </select>

                </div>

                <!-- Submit -->

                <button type="submit" id="payBtn" class="pay-btn">

                    <i class="fa-solid fa-lock"></i>

                    Proceed to Pay

                </button>

            </form>

        </main>

        <!-- Bottom Navigation -->

        <nav>

            <a href="../pages/home.html" class="nav-item">

                <i class="fa-solid fa-house"></i>

                <span>Home</span>

            </a>

            <a href="favourites.html" class="nav-item">

                <i class="fa-solid fa-heart"></i>

                <span>Favourite</span>

            </a>

            <a href="cart.html" class="nav-item">

                <i class="fa-solid fa-cart-shopping"></i>

                <span>Cart</span>

            </a>

            <a href="profile.html" class="nav-item active">

                <i class="fa-solid fa-user"></i>

                <span>Profile</span>

            </a>

        </nav>

    </div>

    <script src="../js/payment.js"></script>

</body>

</html>
