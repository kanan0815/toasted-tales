<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feedback - Toasted Tales</title>

    <!-- Common CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/feedback.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


    <div class="phone">


        <!-- Header -->

        <header class="page-header">

            <a href="profile.html" class="back-btn" aria-label="Back">

                <i class="fa-solid fa-arrow-left"></i>

            </a>


            <h2 class="section-title">

                Feedback

            </h2>


        </header>



        <main class="feedback-main">


            <div class="feedback-card">


                <h1>
                    Share Your Experience ❤️
                </h1>


                <p>
                    Help us improve Toasted Tales
                </p>




                <form id="feedbackForm">


                    <!-- Name -->

                    <div class="inputBox">

                        <label for="feedbackName">
                            Name
                        </label>

                        <input type="text" id="feedbackName" name="feedbackName" placeholder="Your Name" required>

                    </div>



                    <!-- Email -->

                    <div class="inputBox">

                        <label for="feedbackEmail">
                            Email
                        </label>

                        <input type="email" id="feedbackEmail" name="feedbackEmail" placeholder="Your Email (Optional)">

                    </div>




                    <h3>
                        Overall Rating
                    </h3>



                    <div class="rating">

                        <input type="radio" name="rating" id="rating5" value="5" aria-label="5 star rating">

                        <label for="rating5">
                            <i class="fa-solid fa-star"></i>
                        </label>


                        <input type="radio" name="rating" id="rating4" value="4" aria-label="4 star rating">

                        <label for="rating4">
                            <i class="fa-solid fa-star"></i>
                        </label>


                        <input type="radio" name="rating" id="rating3" value="3" aria-label="3 star rating">

                        <label for="rating3">
                            <i class="fa-solid fa-star"></i>
                        </label>


                        <input type="radio" name="rating" id="rating2" value="2" aria-label="2 star rating">

                        <label for="rating2">
                            <i class="fa-solid fa-star"></i>
                        </label>


                        <input type="radio" name="rating" id="rating1" value="1" aria-label="1 star rating">

                        <label for="rating1">
                            <i class="fa-solid fa-star"></i>
                        </label>


                    </div>





                    <!-- Food Quality -->

                    <div class="selectBox">


                        <label for="foodQuality">
                            Food Quality
                        </label>


                        <select id="foodQuality">


                            <option>
                                ⭐⭐⭐⭐⭐ Excellent
                            </option>


                            <option>
                                ⭐⭐⭐⭐ Good
                            </option>


                            <option>
                                ⭐⭐⭐ Average
                            </option>


                            <option>
                                ⭐⭐ Poor
                            </option>


                            <option>
                                ⭐ Very Poor
                            </option>


                        </select>


                    </div>






                    <!-- Service -->


                    <div class="selectBox">


                        <label for="service">
                            Service
                        </label>


                        <select id="service">


                            <option>
                                Excellent
                            </option>


                            <option>
                                Good
                            </option>


                            <option>
                                Average
                            </option>


                            <option>
                                Poor
                            </option>


                        </select>


                    </div>






                    <!-- Visit Again -->


                    <div class="selectBox">


                        <label for="visitAgain">
                            Would you visit again?
                        </label>


                        <select id="visitAgain">


                            <option>
                                Yes
                            </option>


                            <option>
                                Maybe
                            </option>


                            <option>
                                No
                            </option>


                        </select>


                    </div>






                    <!-- Message -->


                    <textarea id="feedbackMessage" placeholder="Write your feedback..." required></textarea>





                    <button type="submit">

                        Submit Feedback

                    </button>




                </form>


            </div>


        </main>





        <!-- Bottom Navigation -->


        <nav>


            <a href="../pages/home.html" class="nav-item">

                <i class="fa-solid fa-house"></i>

                <span>
                    Home
                </span>

            </a>




            <a href="favourites.html" class="nav-item">

                <i class="fa-solid fa-heart"></i>

                <span>
                    Favourite
                </span>

            </a>




            <a href="cart.html" class="nav-item">

                <i class="fa-solid fa-cart-shopping"></i>

                <span>
                    Cart
                </span>

            </a>




            <a href="profile.html" class="nav-item active">

                <i class="fa-solid fa-user"></i>

                <span>
                    Profile
                </span>

            </a>



        </nav>



    </div>





    <!-- Popup -->


    <div id="popup">


        <h2>
            Thank You ❤️
        </h2>


        <p>
            Your feedback has been submitted successfully.
        </p>


        <button onclick="closePopup()">

            OK

        </button>


    </div>




    <script src="../js/feedback.js"></script>


</body>

</html>
