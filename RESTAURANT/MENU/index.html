<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Restaurant</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="phone">

        <!-- Header -->
        <header>
            <h2 data-translate="restaurantName">L’Art de Vivre</h2>

            <div class="language">
                <select id="languageSelect" aria-label="Select language">
                    <option value="EN">English</option>
                    <option value="HI">Hindi</option>
                    <option value="FR">French</option>
                    <option value="KO">Korean</option>
                    <option value="CH">Chinese</option>
                    <option value="PA">Punjabi</option>
                    <option value="TA">Tamil</option>
                    <option value="AR">Arabic</option>
                </select>
            </div>
        </header>

        <!-- Banner -->
        <section class="banner">

            <div class="banner-text">
                <h3 data-translate="bannerTitle">EAT LIKE A CHAMPION</h3>
                <p data-translate="bannerSubtitle">Healthy & Fresh Food</p>
            </div>

            <img src="images/banner.jpg" alt="Banner">

        </section>

        <!-- Categories -->
        <section class="categories">

            <div class="card">
                <i class="fa-solid fa-utensils"></i>
                <h4 data-translate="starter">Starter</h4>
            </div>

            <div class="card">
                <i class="fa-solid fa-mug-hot"></i>
                <h4 data-translate="beverages">Beverages</h4>
            </div>

            <div class="card">
                <i class="fa-solid fa-drumstick-bite"></i>
                <h4 data-translate="mainCourse">Main Course</h4>
            </div>

            <div class="card">
                <i class="fa-solid fa-ice-cream"></i>
                <h4 data-translate="dessert">Dessert</h4>
            </div>

        </section>

        <!-- Navigation -->
        <nav>

            <div class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span data-translate="home">Home</span>
            </div>

            <div class="nav-item">
                <i class="fa-regular fa-heart"></i>
                <span data-translate="favourite">Favourite</span>
            </div>

            <div class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span data-translate="cart">Cart</span>
            </div>

            <div class="nav-item">
                <i class="fa-regular fa-user"></i>
                <span data-translate="profile">Profile</span>
            </div>

        </nav>

    </div>
    <script src="translations.js"></script>
    <script src="script.js"></script>

</body>

</html>
