<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title data-translate="dessert">
        Desserts
    </title>


    <link rel="stylesheet" href="../css/dessert.css">

</head>


<body>


    <div class="phone">


        <header>

            <button onclick="goBack()">←</button>


            <h2 data-translate="dessert">
                Desserts
            </h2>


        </header>





        <div class="container">





            <div class="card">


                <img src="../images/chocolate cake.jpg" alt="Chocolate Cake">


                <h3 data-translate="chocolateCake">
                    Chocolate Cake
                </h3>


                <p class="price" data-price="180"></p>


                <button class="fav-btn" onclick="addFavourite('chocolateCake',180,'../images/chocolate cake.jpg')">

                    ❤️

                </button>


                <button class="add-btn" data-translate="add"
                    onclick="addCart('chocolateCake',180,'../images/chocolate cake.jpg')">

                    Add

                </button>


            </div>

            <div class="card">


                <img src="../images/brownie.jpg" alt="Brownie">


                <h3 data-translate="brownie">
                    Brownie
                </h3>


                <p class="price" data-price="120"></p>


                <button class="fav-btn" onclick="addFavourite('brownie',120,'../images/brownie.jpg')">

                    ❤️

                </button>


                <button class="add-btn" data-translate="add" onclick="addCart('brownie',120,'../images/brownie.jpg')">

                    Add

                </button>


            </div>


            <div class="card">


                <img src="../images/ice cream.jpg" alt="Ice Cream">


                <h3 data-translate="iceCream">
                    Ice Cream
                </h3>


                <p class="price" data-price="90"></p>


                <button class="fav-btn" onclick="addFavourite('iceCream',90,'../images/ice cream.jpg')">

                    ❤️

                </button>


                <button class="add-btn" data-translate="add" onclick="addCart('iceCream',90,'../images/ice cream.jpg')">

                    Add

                </button>


            </div>

            <div class="card">


                <img src="../images/gulab jamun.jpg" alt="Gulab Jamun">


                <h3 data-translate="gulabJamun">
                    Gulab Jamun
                </h3>


                <p class="price" data-price="80"></p>


                <button class="fav-btn" onclick="addFavourite('gulabJamun',80,'../images/gulab jamun.jpg')">

                    ❤️

                </button>


                <button class="add-btn" data-translate="add"
                    onclick="addCart('gulabJamun',80,'../images/gulab jamun.jpg')">

                    Add

                </button>


            </div>

            <div class="card">


                <img src="../images/donut.jpg" alt="Donut">


                <h3 data-translate="donut">
                    Donut
                </h3>


                <p class="price" data-price="110"></p>


                <button class="fav-btn" onclick="addFavourite('donut',110,'../images/donut.jpg')">

                    ❤️

                </button>


                <button class="add-btn" data-translate="add" onclick="addCart('donut',110,'../images/donut.jpg')">

                    Add

                </button>


            </div>


            <div class="card">


                <img src="../images/waffle.jpg" alt="Belgian Waffle">


                <h3 data-translate="waffle">
                    Belgian Waffle
                </h3>


                <p class="price" data-price="190"></p>


                <button class="fav-btn" onclick="addFavourite('belgianWaffle',190,'../images/waffle.jpg')">
                    ❤️

                </button>


                <button class="add-btn" data-translate="add"
                    onclick="addCart('belgianWaffle',190,'../images/waffle.jpg')">

                    Add

                </button>


            </div>

            <div class="card">

                <img src="../images/pancake.jpg" alt="Pancake">


                <h3 data-translate="pancake">
                    Pancake
                </h3>


                <p class="price" data-price="170"></p>
                <button class="fav-btn" onclick="addFavourite('pancake',170,'../images/pancake.jpg')">
                    ❤️
                </button>

                <button class="add-btn" data-translate="add" onclick="addCart('pancake',170,'../images/pancake.jpg')">
                    Add
                </button>


            </div>

        </div>


    </div>


    <!-- Translation -->
    <script src="../js/translations.js" defer></script>
    <script src="../js/script.js" defer></script>

    <script src="../js/favourite.js"></script>
    <script src="../js/dessert.js"></script>

    <div id="toast" class="toast">
        <span id="toastMessage"></span>
    </div>



</body>

</html>
