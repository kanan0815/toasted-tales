<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="favourite">Favourite</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/favourites.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>

    <div class="phone">


        <!-- Header -->

        <header>

            <h2 data-translate="yourFavourites">
                Your Favourites
            </h2>

        </header>


        <main>


            <!-- Hero Banner -->

            <section class="favorite-large-hero-card">

                <div class="hero-card-details">

                    <span class="hero-card-badge" data-translate="favouriteFoods">
                        Favourite Foods
                    </span>


                    <h2 data-translate="favouriteMeals">
                        Your Favourite Meals ❤️
                    </h2>


                    <p data-translate="quickAccess">
                        Quick access to your loved dishes
                    </p>


                </div>



                <div class="hero-card-graphic-wrapper">

                    <span class="food-emoji-large">
                        ❤️
                    </span>

                </div>

            </section>



            <!-- Favourite Items -->

            <section class="favorites-grid" id="favoritesContainer">

            </section>



        </main>




        <!-- Bottom Navigation -->


        <nav>

            <a href="../pages/home.html" class="nav-item">

                <i class="fa-solid fa-house"></i>

                <span data-translate="home">
                    Home
                </span>

            </a>



            <a href="favourites.html" class="nav-item active">

                <i class="fa-solid fa-heart"></i>

                <span data-translate="favourite">
                    Favourite
                </span>

            </a>



            <a href="cart.html" class="nav-item">

                <i class="fa-solid fa-cart-shopping"></i>

                <span data-translate="cart">
                    Cart
                </span>

            </a>



            <a href="profile.html" class="nav-item">

                <i class="fa-regular fa-user"></i>

                <span data-translate="profile">
                    Profile
                </span>

            </a>


        </nav>


    </div>

    <script src="../js/translations.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/favourite.js" defer></script>



</body>

</html>
